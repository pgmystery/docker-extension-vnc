name: Publish Workstation Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/workstation/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_base:
    name: Build and Push Base Workstation
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Base Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/workstation/base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: pgmystery/workstation-base:latest
          labels: |
            pgmystery.vnc.extension.audio.output=true
            pgmystery.vnc.extension.audio.input=true
          build-args: |
            BASE_IMAGE=pgmystery/ubuntu_vnc:xfce

  build_python:
    name: Build and Push Python Workstation
    needs: build_base
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Python Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/workstation/python
          platforms: linux/amd64,linux/arm64
          push: true
          tags: pgmystery/workstation-python:latest
          labels: |
            pgmystery.vnc.extension.audio.output=true
            pgmystery.vnc.extension.audio.input=true
          build-args: |
            BASE_IMAGE=pgmystery/workstation-base:latest

  build_ai:
    name: Build and Push AI Workstation
    needs: build_python
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push AI Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/workstation/ai
          platforms: linux/amd64
          push: true
          tags: pgmystery/workstation-ai:latest
          labels: |
            pgmystery.vnc.extension.audio.output=true
            pgmystery.vnc.extension.audio.input=true
          build-args: |
            BASE_IMAGE=pgmystery/workstation-python:latest

  build_others:
    name: Build and Push Workstation (${{ matrix.workstation }})
    needs: build_base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        workstation: [node, fullstack, java, go, rust, devops]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Workstation Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/workstation/${{ matrix.workstation }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: pgmystery/workstation-${{ matrix.workstation }}:latest
          labels: |
            pgmystery.vnc.extension.audio.output=true
            pgmystery.vnc.extension.audio.input=true
          build-args: |
            BASE_IMAGE=pgmystery/workstation-base:latest
