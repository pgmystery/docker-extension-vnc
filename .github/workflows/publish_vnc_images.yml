name: Publish VNC Ubuntu Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/vnc_ubuntu/**'
      - 'docker/vnc_common/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_bases:
    name: Build and Push VNC Base (${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: core
            file: docker/vnc_ubuntu/base-core/Dockerfile
            tag: core
          - variant: audio-out
            file: docker/vnc_ubuntu/base-audio-out/Dockerfile
            tag: audio-out
          - variant: audio-in
            file: docker/vnc_ubuntu/base-audio-in/Dockerfile
            tag: audio-in
          - variant: audio-full
            file: docker/vnc_ubuntu/base-audio-full/Dockerfile
            tag: audio-full
          - variant: latest
            file: docker/vnc_ubuntu/base/Dockerfile
            tag: latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Base Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          file: ${{ matrix.file }}
          push: true
          tags: pgmystery/vnc-ubuntu-base:${{ matrix.tag }}
          build-args: |
             BASE_IMAGE=pgmystery/vnc-ubuntu-base:core

  build_distros:
    name: Build and Push Distro Images (${{ matrix.distro }})
    needs: build_bases
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [xfce, gnome, mate, cinnamon, kde-plasma, lxde, lxqt, xterm]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Distro Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/vnc_ubuntu/${{ matrix.distro }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            pgmystery/ubuntu_vnc:${{ matrix.distro }}
            ${{ matrix.distro == 'xfce' && 'pgmystery/ubuntu_vnc:latest' || '' }}
          labels: |
            pgmystery.vnc.extension.audio.output=true
            pgmystery.vnc.extension.audio.input=true
          build-args: |
            BASE_IMAGE=pgmystery/vnc-ubuntu-base:latest
