name: Publish VNC Debian Images

on:
  push:
    branches:
      - main
    paths:
      - 'docker/vnc_debian/**'
      - 'docker/vnc_common/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_base:
    name: Build and Push VNC Debian Base Image
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Base Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker
          platforms: linux/amd64,linux/arm64
          file: docker/vnc_debian/base/Dockerfile
          push: true
          tags: pgmystery/vnc-debian-base:latest

  build_distros:
    name: Build and Push Distro Images (${{ matrix.distro }})
    needs: build_base
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [xfce]
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Build and push Distro Image
        uses: docker/build-push-action@v6
        with:
          context: ./docker/vnc_debian/${{ matrix.distro }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            pgmystery/debian_xfce:${{ matrix.distro }}
            pgmystery/debian_xfce:latest
          labels: |
            pgmystery.vnc.extension.audio.output=true
            pgmystery.vnc.extension.audio.input=true
          build-args: |
            BASE_IMAGE=pgmystery/vnc-debian-base:latest
